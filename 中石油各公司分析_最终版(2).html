        function initPage() {
            var sel = document.getElementById('company-select');
            companies.forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c; opt.text = c;
                sel.appendChild(opt);
            });
            update('全部公司');
            sel.addEventListener('change', function() { update(this.value); });
        }

        function update(comp) {
            var d = allData[comp];
            if (!d || d['专业'].length === 0) {
                Plotly.purge('chart');
                document.getElementById('advice-text').innerText = d ? d['建议'] : '暂无数据';
                return;
            }
            // 注意：数据已经是降序排列，Plotly 水平条形图默认从下往上画，为让人数多的在顶部，我们需要反转y轴数组？
            // 实际上，Plotly 的 y 数组第一个元素对应最上方，所以直接使用降序排列的数组即可。
            var colors = d['专业'].map(function(m) { return colorMap[m] || '#636EFA'; });
            var trace = {
                y: d['专业'], x: d['人数'], type: 'bar', orientation: 'h',
                marker: {color: colors}, text: d['人数'], textposition: 'outside'
            };
            var layout = {
                title: comp + ' - 专业通过人数（Top 15）',
                xaxis: {title: '通过人数'},
                height: Math.min(800, d['专业'].length * 30 + 150),
                margin: {l:250, r:40, t:60, b:40},
                template: 'plotly_white',
                yaxis: { autorange: 'reversed' }  // 确保第一个元素在顶部
            };
            Plotly.newPlot('chart', [trace], layout, {responsive: true});
            document.getElementById('advice-text').innerText = d['建议'];
        }
    </script>
